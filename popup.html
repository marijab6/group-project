<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RedFlag</title>

  <link rel="stylesheet" href="dist/tailwind.css" />
  <link rel="stylesheet" href="styles.css" />
</head>

<body class="w-[420px] bg-gray-100 text-gray-900">
  <div class="p-4">
    <section class="bg-white rounded-3xl shadow-lg p-4 border border-gray-100">

      <header>
        <div class="flex items-center justify-between px-2 py-2">
          <div class="flex items-center gap-2">
            <img src="logo-2.png" alt="Logo" class="w-16 h-16 object-contain" />
            <h1 class="text-xl font-semibold tracking-wide">RedFlag</h1>
          </div>

          <button
            id="themeToggle"
            type="button"
            class="toggle-button relative w-12 h-6 rounded-full border-2 border-slate-800 bg-white flex items-center transition"
          >
            <span class="absolute left-1 text-[11px]">🌙</span>
            <span class="absolute right-1 text-[11px]">☀️</span>
            <span
              id="toggleCircle"
              class="toggle-circle absolute left-0 w-6 h-6 rounded-full bg-slate-900 transition-all duration-300"
            ></span>
          </button>
        </div>

        <nav class="border-t border-b -mx-4 border-gray-200 bg-white mb-5">
          <div class="grid grid-cols-2 text-center text-lg">
            <button class="py-2 hover:bg-gray-200 transition">Overview</button>
            <button class="py-2 hover:bg-gray-200 transition">Activity</button>
          </div>
        </nav>
      </header>

      <main>
        <div class="website-card flex justify-between items-center text-[15px] border border-gray-200 bg-gray-50 p-4 rounded-2xl">
          <span class="muted-text text-gray-600">🌐 Current Website:</span>
          <strong id="currentWebsite" class="font-bold">Loading...</strong>
        </div>

        <p class="text-red-500 text-sm font-semibold mt-3">
          Reported users: 0
        </p>

        <div class="mt-6">
          <h3 class="font-bold text-lg">Website status:</h3>
          <p id="websiteStatus" class="text-gray-500 font-semibold mt-1 text-[30px]">
            Checking...
          </p>
        </div>

        <div class="mt-6">
          <h3 class="font-bold text-lg mb-3">Risk score:</h3>

          <div class="relative h-8 border border-green-500 rounded-full overflow-hidden bg-white">
            <div
              id="riskBar"
              class="h-full w-[0%] bg-green-500 rounded-full transition-all duration-500"
            ></div>

            <span
              id="riskScore"
              class="risk-score absolute right-4 top-1/2 -translate-y-1/2 font-bold text-sm"
            >
              0%
            </span>
          </div>
        </div>

        <div class="mt-7">
          <h3 class="font-bold text-lg mb-3">Reasons:</h3>

          <ul id="reasonsList" class="space-y-3 text-[15px]">
            <li class="text-gray-500">No reasons yet.</li>
          </ul>
        </div>

        <div class="mt-7">
          <h3 class="font-bold text-lg mb-3">AI Analysis:</h3>

          <div id="content" class="ai-card bg-gray-50 rounded-2xl p-4">
            <p
              id="text"
              class="text-sm leading-relaxed text-gray-700 text-overflow"
            >
              Waiting for analysis...
            </p>

            <button
              id="expand-link"
              type="button"
              class="hidden font-bold text-blue-500 hover:text-blue-700 cursor-pointer mt-2"
            >
              See More
            </button>
          </div>
        </div>

        <div class="flex items-center justify-center mt-6">
          <div class="flex gap-4">
            <button
              id="reportBtn"
              type="button"
              class="bg-green-600 hover:bg-green-700 transition text-white text-[15px] px-6 py-3 rounded-2xl font-medium"
            >
              Report Website
            </button>

            <button
              id="analyzeAgainBtn"
              type="button"
              class="bg-blue-600 hover:bg-blue-700 transition text-white text-[15px] px-6 py-3 rounded-2xl font-medium"
            >
              Analyze Again
            </button>
          </div>
        </div>
      </main>
    </section>

    <footer class="text-gray-500 items-center justify-center flex pt-4">
      © 2026 RedFlag. All rights reserved.
    </footer>
  </div>

  <script src="popup.js"></script>
</body>
</html>
